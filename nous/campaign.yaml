research_question: >
  Given the analytic primitives ITL(B), TTFT components, and tau(B) for a vLLM-style
  inference server, derive M-hat(params) = argmax_M f(M) and design a formula-guided
  search that pinpoints argmax_M f via few /target calls. Score on (calls,
  gap_throughput_rel); see nous/description.txt for the full brief.

run_id: queue-throughput-formulas

max_iterations: 5

models:
  # DESIGN phase (the observe/reasoning iterations) on Opus 4.8. execute_analyze
  # and report are omitted, so they fall through to defaults.yaml (sonnet-4-6).
  # Precedence: campaign.models > orchestrator/defaults.yaml > --model flag.
  design: "claude-opus-4-8"

target_system:
  name: "queue-analysis"
  description: >
    Go REST server (main.go) that solves a state-dependent Markovian queueing model
    of a vLLM inference server. Two endpoints on :8080:
      - /solve  : analyze the queue at a given (RPS, MaxBatchSize, ...) and return
                  Throughput, AvgITL, AvgTTFT, etc.
      - /target : find the maximum RPS that satisfies AvgITL <= TargetITL and
                  AvgTTFT <= TargetTTFT for a given MaxBatchSize, returning that
                  RPS as Throughput.
    See examples/problem-data.json (input) and examples/solution-target.json
    (output) for the schemas.
  observable_metrics:
    - throughput
    - avgITL
    - avgTTFT
    - calls_to_target_per_search
    - gap_throughput_rel
  controllable_knobs:
    - MaxBatchSize
    - search_strategy_in_nous_harness_strategies
  repo_path: /Users/tantawi/Projects/llm-inferno/queue-analysis

prompts:
  methodology_layer: "prompts/methodology"
  domain_adapter_layer: null
