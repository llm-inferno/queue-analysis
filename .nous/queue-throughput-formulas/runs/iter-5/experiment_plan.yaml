        output: "/Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput-formulas/runs/iter-5/results/h-control-negative/naive_max.json"
        inputs:
          - "/Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput-formulas/runs/iter-5/inputs/bench_truth"

  - arm_id: "h-ablation"
