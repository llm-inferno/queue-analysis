metadata:
  iteration: 3
  family: "closed-form-predictor"
  research_question: "Can M* be predicted from input parameters alone with |M_est - M*| <= 5, and does the predictor correctly classify crossover vs no-crossover scenarios?"

arms:
  - type: h-main
    prediction: "The closed-form predictor M_est = round(n_ITL + 3.0*sqrt(n_ITL) + 0.05*wait_budget) achieves |M_est - M*| <= 5 for all crossover scenarios (baseline, long-loose-itl, small-queue). The max error across these three scenarios will be <= 2. The mechanism relies on n_ITL = (targetITL - d_intercept) / d_slope being the characteristic batch occupancy at the crossover point, derived from DecodeTime linearity."
    mechanism: "At the crossover M*, both TTFT and ITL constraints bind simultaneously. The ITL constraint forces avg occupancy to n_ITL (where DecodeTime(n_ITL) = targetITL, from the linear formula at queueanalyzer.go:278). M* exceeds n_ITL by a buffer proportional to sqrt(n_ITL) (stochastic fluctuation headroom to keep the queue empty) plus a small correction for the TTFT wait-time budget. The proportionality to sqrt(n_ITL) arises because the birth-death process variance scales with the mean occupancy."
    diagnostic: "If error > 5 for any scenario: (a) check if the observed avg occupancy at crossover deviates from n_ITL by more than 2 units (would indicate the linear DecodeTime approximation breaks down under queue effects); (b) check if the 3.0*sqrt term is scenario-dependent (would require a scenario-specific coefficient). If error is 3-5 for long-loose-itl: the 0.05 wait_budget coefficient may need adjustment for large wait budgets."

  - type: h-ablation
    prediction: "Removing the wait_budget term (coefficient = 0) increases the predictor error for long-loose-itl from <= 2 to >= 6, while baseline and small-queue remain at error <= 2. The ablated formula M_est = round(n_ITL + 3.0*sqrt(n_ITL)) systematically UNDER-predicts M* for scenarios with large wait budgets (> 50ms) because it ignores the additional capacity headroom needed to accommodate queueing delay."
    mechanism: "The wait_budget = targetTTFT - targetITL - PrefillTime(n_ITL) represents the allowed queueing delay at the crossover point. Scenarios with large wait budgets (long-loose-itl: 107ms) have higher utilization at crossover (rho=0.88 vs 0.71), which requires M* further above n_ITL to sustain that utilization. The 0.05*wait_budget term corrects for this: 0.05 * 107 ≈ 5 extra M units needed. Removing it causes under-prediction."
    diagnostic: "If ablation does NOT degrade long-loose-itl: the wait_budget contribution may be captured by the sqrt term through some indirect coupling. Re-examine whether n_ITL for long-loose-itl already encodes the wait budget implicitly."

  - type: h-control-negative
    prediction: "For short-tight-ttft, the predictor computes wait_budget = targetTTFT - targetITL - PrefillTime(n_ITL) < 0 (specifically ≈ -11.3ms), correctly identifying it as a no-crossover scenario. This matches the observed behavior from iter-2 where R(M) never reaches 1.0 (max R ≈ 0.50). The sign of wait_budget perfectly separates all 4 scenarios into crossover (positive) and no-crossover (negative) classes."
    mechanism: "When wait_budget < 0, it means PrefillTime(n_ITL) + targetITL > targetTTFT — the TTFT budget is ALREADY exhausted by prefill + decode even at zero queueing delay. This makes TTFT the permanently binding constraint at all M values, preventing the TTFT rate from ever catching up to the ITL rate. Geometrically: RPSTargetTTFT(M) < RPSTargetITL(M) for all M because the TTFT budget can never accommodate the rate needed by ITL. This is the mathematical equivalent of RP-5's plateau-onset characterization."
    diagnostic: "If wait_budget has wrong sign for any scenario: re-examine whether PrefillTime(n_ITL) uses the correct average batch size. The formula assumes avg occupancy = n_ITL at the would-be crossover rate, which may not hold if the system would be saturated at that rate."

  - type: h-robustness
    prediction: "A hybrid strategy that uses the predictor M_est as the center of a narrow ±5 search range requires at most ceil(log2(11)) = 4 binary search calls + 1 confirmatory = 5 total calls to find M* exactly (gap=0) for all crossover scenarios. This represents a 44% reduction from the 9 calls needed by the full-range binary search (iter-2). For the no-crossover case, the fallback (probe the predicted plateau region) achieves gap=0 in at most 5 total calls."
    mechanism: "The predictor guarantees |M_est - M*| <= 2 (observed) for all crossover scenarios. A binary search on [M_est-5, M_est+5] (width 11) using the ratio R(M) crossing 1.0 finds the exact crossover in ceil(log2(11))=4 steps. Since the predictor uses only input parameters (no oracle calls), the entire call budget goes to the narrow search. The asymptotic improvement is O(log(width)) vs O(log(m_max-m_min))."
    diagnostic: "If the strategy needs > 5 calls: the predictor error exceeded 5 for some scenario, meaning the ±5 window didn't contain M*. Widen to ±8 (costs 1 extra call) or re-examine predictor coefficient fitting."
    code_changes:
      - file: "nous/harness/strategies/predictor_hybrid.py"
        intent: "Create a strategy that reads scenario parameters from the oracle's first response, computes M_est using the closed-form predictor, then does binary search on ratio R(M) in [M_est-5, M_est+5]. Fallback to full-range binary search if the narrow window doesn't bracket the crossover."
        rationale: "Validates that the predictor-guided approach achieves the theoretical 5-call budget in practice. The strategy can extract scenario params from the oracle interface (they're passed into target_eval's closure via the scenario object), or alternatively receive them through a config mechanism."
