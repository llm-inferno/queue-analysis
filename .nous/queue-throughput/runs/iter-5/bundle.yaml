metadata:
  iteration: 5
  family: "adaptive-interpolation-search"
  research_question: "Can a scenario-agnostic algorithm achieve fewer than 9 oracle calls (full binary search) while maintaining gap_throughput_rel ≈ 0? Specifically, what is the minimum worst-case call count without scenario knowledge, and how does it compare to predictor_direct (5 calls)?"

arms:
  - type: h-main
    prediction: "adaptive_interpolation achieves worst-case calls = 7 (6 strategy + 1 confirm) for crossover scenarios and calls = 3 (2 strategy + 1 confirm) for the no-crossover scenario, with gap_throughput_rel = 0 for all 4 scenarios. Per-scenario: baseline=7, short-tight-ttft=3, long-loose-itl=7, small-queue=7."
    mechanism: "Two synergistic mechanisms reduce calls from 9 to 7. (1) Smart first probe at midpoint (M=129): if R>=1.0, the search space immediately halves to [2,128] — this gives the same narrowing as the first binary step but also enables early no-crossover detection via a single m_max probe if R<1.0. (2) Interpolation: once a bracket [lo, hi] with measured R(lo)<1.0 and R(hi)>=1.0 is established, linear interpolation of R estimates the crossing point with error proportional to R's nonlinearity. Since R(M) is approximately linear in tight brackets (slope variation <15%), each interpolation step narrows by ~3-4x vs binary's 2x. Three interpolation steps replace 5 binary steps for width-30 brackets."
    diagnostic: "If worst-case > 7: check which scenario and trace R values. The most likely failure is interpolation overshooting on a scenario where R(M) has stronger curvature than observed. If gap > 0: the interpolation landed on the wrong side of the crossover — verify that R monotonicity holds."
    code_changes:
      - file: "nous/harness/strategies/adaptive_interpolation.py"
        intent: "Implement interpolation search with smart midpoint start and early no-crossover exit. Probe M=(m_min+1+m_max)//2 first. If R<1.0 there, probe m_max for no-crossover detection. Once bracket established, use linear interpolation of R to find the crossing instead of pure midpoint bisection."
        rationale: "Tests whether exploiting the continuous R values (not just above/below 1.0) can beat the information-theoretic 8-probe bound for binary comparison search."

  - type: h-control-negative
    prediction: "ratio_binary_search requires exactly 9 calls (8 strategy + 1 confirm) for all 4 scenarios, confirming the baseline cost when neither interpolation nor early exit is present."
    mechanism: "Standard binary search on [2, 256] requires ceil(log2(255))=8 comparisons regardless of where M* lies. Without early no-crossover detection, the no-crossover scenario (short-tight-ttft) also takes 8 binary probes before concluding R never crosses 1.0."
    diagnostic: "If calls ≠ 9 for any scenario: the binary search range or termination logic has changed. Check m_min, m_max, and the while-loop condition."

  - type: h-ablation
    prediction: "adaptive_binary (same structure but no interpolation) achieves worst-case calls = 9 for crossover scenarios and 3 for no-crossover. The 7→9 regression on crossover scenarios (compared to adaptive_interpolation) proves interpolation is load-bearing for the call reduction."
    mechanism: "Without interpolation, the midpoint-start saves 0 net calls: starting at 129 vs 129 gives the same binary search depth. The only benefit retained is early no-crossover exit (saving 6 calls for short-tight-ttft). For crossover scenarios, pure binary on [2, 128] needs ceil(log2(127))=7 probes after the first midpoint probe = 8 strategy + 1 = 9 total."
    diagnostic: "If crossover calls < 9: the binary search range narrowed more than expected (check if the midpoint probe contributed differently than predicted). If no-crossover calls ≠ 3: the early exit path is broken."
    code_changes:
      - file: "nous/harness/strategies/adaptive_binary.py"
        intent: "Same as adaptive_interpolation but ALWAYS use (lo+hi)//2 as the probe point (never interpolate). This isolates the contribution of interpolation from the contribution of smart-start + early-exit."
        rationale: "Ablates interpolation to measure its specific contribution to call reduction. If adaptive_binary matches adaptive_interpolation's calls, interpolation isn't helping; if it matches ratio_binary_search, interpolation accounts for the full improvement."

  - type: h-robustness
    prediction: "At m_max=512 (doubled range), adaptive_interpolation achieves worst-case calls = 8 (exactly +1 over m_max=256). The scaling is +1 call per range doubling, confirming sub-binary convergence. Specifically: baseline=8, short-tight-ttft=3, long-loose-itl=8, small-queue=8."
    mechanism: "Doubling m_max from 256 to 512 adds one binary step before the bracket is established (the midpoint goes from 129 to 257, requiring one extra narrowing step). But once the bracket is within width ~64, interpolation convergence is unchanged. The +1 per doubling (not +1 per ~2x as binary would predict for the same improvement) confirms interpolation's contribution."
    diagnostic: "If calls > 8 at m_max=512: interpolation may be degraded by the wider initial bracket (more nonlinearity over larger M range). Check if R(M) becomes less linear at M>256. If calls < 8: the algorithm is performing better than predicted — verify results are correct."
