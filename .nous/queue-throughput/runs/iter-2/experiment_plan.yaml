metadata:
  iteration: 2
  bundle_ref: "runs/iter-2/bundle.yaml"
  research_question: >
    Can M* be detected in O(log N) oracle calls via binary search on
    R(M) = RPSTargetTTFT/RPSTargetITL crossing 1.0?

setup:
  - cmd: "go build -o /tmp/queue-analysis ."
    description: "Build the queue-analysis binary (run from worktree root)"
  - cmd: "git apply /Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/patches/h-main.patch"
    description: "Apply ratio_binary_search strategy patch"
  - cmd: "echo 'venv: /Users/tantawi/Projects/llm-inferno/queue-analysis/nous/.venv cache: /Users/tantawi/Projects/llm-inferno/queue-analysis/nous/cache'"
    description: "Note: all harness commands use absolute venv and cache paths"

arms:
  - arm_id: "h-main"
    conditions:
      - name: "ratio-binary-search"
        cmd: >
          source /Users/tantawi/Projects/llm-inferno/queue-analysis/nous/.venv/bin/activate &&
          git apply /Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/patches/h-main.patch &&
          python -m nous.harness.run
            --scenarios nous/scenarios.json
            --strategy nous/harness/strategies/ratio_binary_search.py
            --cache-dir /Users/tantawi/Projects/llm-inferno/queue-analysis/nous/cache
            --out /Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/results/h-main/ratio_binary_search.json
        output: "/Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/results/h-main/ratio_binary_search.json"
        inputs:
          - "/Users/tantawi/Projects/llm-inferno/queue-analysis/.nous-experiments/iter-2-cca61f4b/nous/scenarios.json"
          - "/Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/patches/h-main.patch"
      - name: "baseline-linear-scan"
        cmd: >
          source /Users/tantawi/Projects/llm-inferno/queue-analysis/nous/.venv/bin/activate &&
          python -m nous.harness.run
            --scenarios nous/scenarios.json
            --strategy nous/harness/strategies/example_linear_scan.py
            --m-min 35 --m-max 45
            --cache-dir /Users/tantawi/Projects/llm-inferno/queue-analysis/nous/cache
            --out /Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/results/h-main/baseline_linear_scan.json
        output: "/Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/results/h-main/baseline_linear_scan.json"
        inputs:
          - "/Users/tantawi/Projects/llm-inferno/queue-analysis/.nous-experiments/iter-2-cca61f4b/nous/scenarios.json"

  - arm_id: "h-ablation"
    conditions:
      - name: "itl-only"
        cmd: >
          source /Users/tantawi/Projects/llm-inferno/queue-analysis/nous/.venv/bin/activate &&
          python /Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/inputs/probe_ablation.py
            2>/dev/null
            > /Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/results/h-ablation/ablation_probe.json
        output: "/Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/results/h-ablation/ablation_probe.json"
        inputs:
          - "/Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/inputs/probe_ablation.py"

  - arm_id: "h-robustness"
    conditions:
      - name: "diff-ratios"
        cmd: >
          source /Users/tantawi/Projects/llm-inferno/queue-analysis/nous/.venv/bin/activate &&
          python /Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/inputs/analyze_diff_ratios.py
            > /Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/results/h-robustness/diff_ratios.json
        output: "/Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/results/h-robustness/diff_ratios.json"
        inputs:
          - "/Users/tantawi/Projects/llm-inferno/queue-analysis/.nous/queue-throughput/runs/iter-2/inputs/analyze_diff_ratios.py"
          - "/Users/tantawi/Projects/llm-inferno/queue-analysis/nous/cache/truth-baseline.json"
          - "/Users/tantawi/Projects/llm-inferno/queue-analysis/nous/cache/truth-long-loose-itl.json"
          - "/Users/tantawi/Projects/llm-inferno/queue-analysis/nous/cache/truth-small-queue.json"
