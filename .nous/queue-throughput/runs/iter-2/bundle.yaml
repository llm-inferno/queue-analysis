metadata:
  iteration: 2
  family: "crossover-ratio-detection"
  research_question: "Is M* detectable in O(log N) calls via binary search on the monotone ratio R(M) = RPSTargetTTFT(M) / RPSTargetITL(M) crossing 1.0? Does the two-phase structure depend on both constraints being active?"

arms:
  - type: h-main
    prediction: >
      For all scenarios with a crossover (baseline, long-loose-itl, small-queue),
      binary search on R(M) = RPSTargetTTFT/RPSTargetITL crossing 1.0 finds M*
      exactly (gap_throughput_rel = 0.0) in at most ceil(log2(255)) = 8 search calls
      (9 total including confirmatory). R(M) is strictly monotone increasing in
      [2, M*+5] for all three scenarios, confirmed by full-range probes showing
      zero monotonicity violations below M*.
    mechanism: >
      RPSTargetTTFT grows monotonically with M because TTFT is dominated by
      queueing delay, which decreases as M increases (higher service rate reduces
      queue buildup). RPSTargetITL peaks early then decays because decode time
      grows linearly with M (DecodeTime = IterationTime(M) + beta + gamma*(AvgIn +
      (AvgOut+1)/2), where IterationTime is linear in M). The ratio R(M) is the
      quotient of a monotone-increasing numerator and a eventually-decreasing
      denominator, making it strictly increasing. The crossover R=1.0 is exactly
      where min(TTFT, ITL) switches binding constraint. Source:
      pkg/analyzer/queueanalyzer.go:242 (the min operation),
      pkg/analyzer/queueanalyzer.go:263-281 (linear-in-M time formulas).
    diagnostic: >
      If ratio binary search returns M != M_truth, check: (1) whether the ratio has
      a local non-monotonicity near the crossover (probe M*-1, M*, M*+1 and verify
      R(M*-1) < 1.0 < R(M*)); (2) whether the confirmatory call produces different
      throughput than the search call (numerical instability in the binary search
      inside the Go analyzer). If gap > 0 but M is within 1 step of M_truth, the
      throughput plateau means the gap is negligible.
    code_changes:
      - file: "nous/harness/strategies/ratio_binary_search.py"
        intent: >
          New strategy file. Implements search(target_eval, m_min, m_max) -> int.
          Binary searches for the smallest M where RPSTargetTTFT >= RPSTargetITL in
          the oracle response. If the search converges to m_max without finding
          the crossover (no-crossover case), falls back to finding the plateau onset:
          evaluates a few points and returns the M with highest observed throughput.
        rationale: >
          Tests whether the ratio monotonicity (confirmed by full-range probes in
          exploration) translates into an efficient O(log N) strategy. The fallback
          handles the short-tight-ttft scenario where no crossover exists.

  - type: h-ablation
    prediction: >
      With only ITL active (targetTTFT=9999): f(M) peaks at M=24 for baseline and
      then decays by approximately 3% to M=256. With only TTFT active
      (targetITL=9999): f(M) is monotone-then-flat with negligible drop
      (< 0.001%) from peak to M=256. Neither single-constraint shape has the sharp
      crossover at M=40 that makes ratio-based detection possible.
    mechanism: >
      The two-phase structure is caused exclusively by the min(lambdaStarTTFT,
      lambdaStarITL) at queueanalyzer.go:242. Remove one term and the min is
      trivially the remaining scalar curve. ITL alone produces a peaked curve
      because RPSTargetITL peaks at M≈24 (where the marginal service-rate benefit
      from batching is offset by increased decode time). TTFT alone produces
      monotone-then-flat because higher M always reduces queueing delay (more
      service capacity) until the system saturates.
    diagnostic: >
      If ITL-only is NOT peaked, check whether targetITL=9999 actually disables
      the ITL binary search (it should skip it via the lambdaStarITL=lambdaMax
      default at queueanalyzer.go:217). If TTFT-only shows a sharp peak, check
      whether maxQueueSize creates a blocking effect that limits TTFT capacity.

  - type: h-control-negative
    prediction: >
      For short-tight-ttft, R(M) never reaches 1.0 (max ratio ≈ 0.50 at M=256).
      The ratio binary search converges to m_max and triggers the fallback path.
      The fallback returns an M on the plateau with gap_throughput_rel < 0.001,
      using no more than 15 total calls (8 binary search + fallback probes +
      1 confirmatory).
    mechanism: >
      short-tight-ttft has targetTTFT=35ms which is very tight relative to
      PrefillTime growth. RPSTargetTTFT saturates early and remains far below
      RPSTargetITL (ratio ≈ 0.38-0.50) for all M. The effective plateau starts
      at M≈26 (99% of peak). Since the TTFT constraint permanently dominates,
      there is no crossover and no M* in the meaningful sense.
    diagnostic: >
      If the strategy fails (gap > 0.001), examine the fallback logic: does it
      correctly detect the no-crossover condition? Does it evaluate enough points
      in the plateau to find a near-optimal M? If the fallback uses too many
      calls, consider whether the binary search itself provides useful throughput
      observations that can be reused.

  - type: h-robustness
    prediction: >
      For all crossover scenarios (baseline, long-loose-itl, small-queue), the
      first-difference ratio df(M*)/df(M*-1) at the crossover is < 0.55, while
      the normal concavity ratio df(M)/df(M-1) for M in the rising region stays
      in [0.96, 0.99]. The separation (min normal ratio - crossover ratio) is
      > 0.40 for all scenarios, making the crossover signature unambiguous from
      the throughput trajectory alone (no auxiliary ratio needed).
    mechanism: >
      At M*-1, the TTFT constraint is binding and the throughput increment
      df(M*-1) reflects the full TTFT-governed growth rate. At M*, the ITL
      constraint takes over — but since the approach to the crossover is from
      the TTFT-bound side, df(M*) is a partial step (only the portion until
      crossover). At M*+1, the ITL constraint fully binds and the curve is
      flat, so df(M*+1) ≈ 0. The dramatic ratio drop at M* (from ~0.97 to
      ~0.30-0.54) is the throughput-domain signature of the crossover that is
      independently detectable from the ratio R(M).
    diagnostic: >
      If a scenario shows crossover ratio > 0.55 or normal ratio outside [0.96,
      0.99], examine whether: (1) the transition width is very large (making the
      crossover gradual rather than sharp), (2) the binary-search resolution in
      the Go analyzer creates step-function artifacts that blur the crossover.
